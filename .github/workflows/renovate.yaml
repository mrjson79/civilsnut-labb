name: Renovate

on:
  schedule:
    # Run every Monday at 04:00 UTC (05:00 CET / 06:00 CEST) - before the "before 6am" schedule window
    - cron: "0 4 * * 1"
    # Run every Saturday at 04:00 UTC for home automation / monitoring updates
    - cron: "0 4 * * 6"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
          - trace
  push:
    branches:
      - main
    paths:
      - "renovate.json"
      - ".github/workflows/renovate.yaml"

env:
  LOG_LEVEL: ${{ inputs.logLevel || 'info' }}

jobs:
  renovate:
    name: Renovate Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v40.3.2
        env:
          LOG_LEVEL: ${{ env.LOG_LEVEL }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # When triggered manually, bypass all schedules so all pending updates are created immediately
          RENOVATE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '{"schedule":[]}' || '' }}
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
