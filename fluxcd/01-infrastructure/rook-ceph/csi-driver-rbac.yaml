# CSI driver ServiceAccounts + RBAC for the ceph-csi-operator RBD driver.
#
# WHY THIS EXISTS: rook-ceph v1.20.x dropped the per-driver SA/RBAC templates
# that its bundled ceph-csi-operator subchart shipped in v1.19.x, while the
# operator still wires the rbd ctrlplugin/nodeplugin pods to ServiceAccounts
# "rbd-ctrlplugin-sa"/"rbd-nodeplugin-sa" (csiServiceAccountPrefix: ""). The
# upgrade pruned these objects, breaking ALL RBD attach/detach. This manifest
# restores them (rules rendered verbatim from the rook v1.19.7 ceph-csi-operator
# subchart). REMOVE this file if a future rook chart recreates these resources.
---
# Source: ceph-csi-operator/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbd-ctrlplugin-sa
  namespace: rook-ceph
  labels:
    app.kubernetes.io/name: ceph-csi
  annotations:
    {}
---
# Source: ceph-csi-operator/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbd-nodeplugin-sa
  namespace: rook-ceph
  labels:
    app.kubernetes.io/name: ceph-csi
  annotations:
    {}

---
