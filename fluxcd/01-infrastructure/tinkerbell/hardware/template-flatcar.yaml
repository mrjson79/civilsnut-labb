apiVersion: tinkerbell.org/v1alpha1
kind: Template
metadata:
  name: flatcar-amd64
  namespace: tinkerbell
spec:
  data: |
    version: "0.1"
    name: flatcar-amd64
    global_timeout: 3600
    tasks:
      - name: flatcar-install
        worker: "{{.device_1}}"
        volumes:
          - /dev:/dev
        actions:
          # 1) Stream the Flatcar production image (zstd, ~807MB) to disk.
          #    image2disk decompresses zstd inline with COMPRESSED=true.
          #    Served in-cluster by the osie/HookOS nginx on wrk-01 (the same
          #    stable host:port the box uses for HookOS); uploaded into the
          #    hook-artifacts PVC. No dependency on the workstation.
          - name: stream-flatcar-to-disk
            image: quay.io/tinkerbell/actions/image2disk:latest
            timeout: 1800
            environment:
              DEST_DISK: /dev/sda
              IMG_URL: "http://192.168.1.141:7173/flatcar_production_image_x86-64.bin.zst"
              COMPRESSED: "true"

          # 2) Write the Ignition config to the Flatcar OEM partition (/dev/sda6,
          #    LABEL=OEM, btrfs) as /config.ign — the documented location Flatcar
          #    reads on first boot (same file `flatcar-install -i` writes).
          #    The OEM partition (/dev/sda6, LABEL=OEM) is btrfs (confirmed from
          #    the image). config.ign here is what `flatcar-install -i` writes.
          - name: write-ignition-to-oem
            image: quay.io/tinkerbell/actions/writefile:latest
            timeout: 120
            environment:
              DEST_DISK: /dev/sda6
              FS_TYPE: btrfs
              DEST_PATH: /config.ign
              UID: "0"
              GID: "0"
              MODE: "0644"
              DIRMODE: "0755"
              CONTENTS: |
                {"ignition":{"version":"3.4.0"},"storage":{"files":[{"path":"/etc/hostname","contents":{"source":"data:,{{.hostname}}%0A"},"mode":420}]},"passwd":{"users":[{"name":"core","sshAuthorizedKeys":["ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKN1Pr9CO7RsbiITN4Kp9hyPSmyqT0bCteVzKv6qabqn flatcar"]}]}}
