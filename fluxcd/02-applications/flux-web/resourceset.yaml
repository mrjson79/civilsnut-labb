apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: flux-web
  namespace: flux-system
spec:
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: flux-web
        namespace: flux-system
      spec:
        interval: 30m
        url: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
        layerSelector:
          mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
          operation: copy
        ref:
          semver: "*"
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: flux-web
        namespace: flux-system
      spec:
        interval: 30m
        releaseName: flux-web
        chartRef:
          kind: OCIRepository
          name: flux-web
        valuesFrom:
          - kind: Secret
            name: flux-web-oidc
            valuesKey: client-id
            targetPath: web.config.authentication.oauth2.clientID
          - kind: Secret
            name: flux-web-oidc
            valuesKey: client-secret
            targetPath: web.config.authentication.oauth2.clientSecret
        values:
          fullnameOverride: flux-web
          installCRDs: false
          web:
            serverOnly: true
            config:
              baseURL: https://fluxcd.civilsnut.se
              authentication:
                type: OAuth2
                oauth2:
                  provider: OIDC
                  issuerURL: https://idp.tail79231e.ts.net
                  scopes:
                    - openid
                    - email
                    - profile
