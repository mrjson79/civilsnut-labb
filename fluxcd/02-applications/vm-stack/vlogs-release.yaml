apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
  namespace: monitoring
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: victoria-logs-single
      sourceRef:
        kind: HelmRepository
        name: vm
        namespace: monitoring
      interval: 1h
  values:
    server:
      retentionPeriod: "7"
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        accessModes:
          - ReadWriteOnce
        size: 20Gi
      resources:
        # Bumped from 256Mi/512Mi: the server holds ~3.3GB of logs and was
        # GC-thrashing under the 512Mi cap (cache limited to ~307Mi), causing
        # the /health readiness probe to time out and flap NotReady — which in
        # turn emptied the headless Service's endpoints and broke vector's DNS
        # ("Name or service not known"), stopping all log ingestion.
        requests:
          memory: 1Gi
          cpu: 250m
        limits:
          memory: 2Gi
          cpu: "1"
      nodeSelector:
        has-disk: "yes"
      vmServiceScrape:
        enabled: true
    vector:
      enabled: true
